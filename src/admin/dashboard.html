<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CRM Dashboard | Admin</title>

<link rel="stylesheet" href="/css/base.css">

<style>

/* ===== DASHBOARD STYLE ===== */

body {
  padding: 40px;
}

.dashboard-container {
  max-width: 1200px;
  margin: auto;
}

h1 {
  margin-bottom: 20px;
}

/* TABLE */

table {
  width: 100%;
  border-collapse: collapse;
  background: rgba(255,255,255,0.05);
  backdrop-filter: blur(20px);
  border-radius: 16px;
  overflow: hidden;
}

th, td {
  padding: 14px;
  text-align: left;
  border-bottom: 1px solid rgba(255,255,255,0.1);
}

th {
  background: #138808;
  color: white;
}

.status {
  padding: 6px 12px;
  border-radius: 20px;
  font-size: 12px;
  background: #ff9933;
  color: black;
  font-weight: bold;
}

button {
  padding: 6px 12px;
  border: none;
  border-radius: 6px;
  cursor: pointer;
}

.delete-btn {
  background: red;
  color: white;
}

.update-btn {
  background: #138808;
  color: white;
}

.logout-btn {
  background: black;
  color: white;
  margin-bottom: 20px;
}

</style>

</head>
<body>

<div class="dashboard-container">

<h1>🚀 CRM Dashboard</h1>

<button class="logout-btn" onclick="logout()">Logout</button>

<table>
<thead>
<tr>
<th>Name</th>
<th>Email</th>
<th>Subject</th>
<th>Status</th>
<th>Action</th>
</tr>
</thead>

<tbody id="enquiryTable"></tbody>

</table>

</div>

<script>

/* ==============================
   CHECK LOGIN TOKEN
============================== */

const token = localStorage.getItem("adminToken");

if(!token){
  window.location.href = "/admin/login.html";
}

/* ==============================
   LOAD ENQUIRIES
============================== */

async function loadEnquiries(){

  const res = await fetch("/api/admin/enquiries", {
    headers: {
      "Authorization": token
    }
  });

  const data = await res.json();

  const table = document.getElementById("enquiryTable");

  table.innerHTML = "";

  data.forEach(item => {

    table.innerHTML += `
    <tr>
      <td>${item.name}</td>
      <td>${item.email}</td>
      <td>${item.subject}</td>
      <td><span class="status">${item.status}</span></td>
      <td>
        <button class="update-btn"
          onclick="updateStatus('${item._id}')">
          Update
        </button>

        <button class="delete-btn"
          onclick="deleteEnquiry('${item._id}')">
          Delete
        </button>
      </td>
    </tr>
    `;

  });

}

loadEnquiries();

/* ==============================
   DELETE
============================== */

async function deleteEnquiry(id){

  await fetch(`/api/admin/enquiry/${id}`,{
    method:"DELETE",
    headers:{
      "Authorization": token
    }
  });

  loadEnquiries();
}

/* ==============================
   UPDATE STATUS
============================== */

async function updateStatus(id){

  const status = prompt("Enter New Status (New / Contacted / Closed)");

  if(!status) return;

  await fetch(`/api/admin/enquiry/${id}`,{
    method:"PUT",
    headers:{
      "Content-Type":"application/json",
      "Authorization": token
    },
    body: JSON.stringify({ status })
  });

  loadEnquiries();
}

/* ==============================
   LOGOUT
============================== */

function logout(){
  localStorage.removeItem("adminToken");
  window.location.reload();
}

</script>

</body>
</html>
