name: CI

on:
  push:
    branches: ["main", "dev"]
  pull_request:
    branches: ["main"]

jobs:
  test:
    name: Jest tests
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm run test:ci
        env:
          NODE_ENV: test
          DATABASE_URL: ""
          DATABASE_SSL: "false"
          HI_API_KEY: ci-hi-api-key-placeholder
          AUTH_JWT_SECRET: ci-jwt-secret-placeholder-32chars-long
          JARVIS_API_BASE: ""
          JARVIS_BACKEND_URL: ""
          JARVIS_BRIDGE_SECRET: ci-bridge-secret
          OTP_API_BASE: ""
          OPENAI_API_KEY: ""
          OPENAI_MODEL: gpt-4o-mini
          OPENAI_BASE_URL: ""
          LIVE_CLASS_TOKEN: ""
          VAPID_PUBLIC_KEY: ""
          VAPID_PRIVATE_KEY: ""
          VAPID_SUBJECT: mailto:ci@example.com

      - name: Upload coverage
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage
          path: coverage/
          retention-days: 7
